<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            light: '#4f46e5',
                            dark: '#7c73e6'
                        },
                        secondary: {
                            light: '#10b981',
                            dark: '#34d399'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    backgroundImage: {
                        'colorful-glass': 'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 25%, #fbc2eb 50%, #fcb69f 75%, #a1c4fd 100%)',
                        'colorful-glass-dark': 'linear-gradient(135deg, #232526 0%, #414345 25%, #434343 50%, #232526 75%, #232526 100%)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-image: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 25%, #fbc2eb 50%, #fcb69f 75%, #a1c4fd 100%);
        }
        .dark body {
            background-image: linear-gradient(135deg, #232526 0%, #414345 25%, #434343 50%, #232526 75%, #232526 100%);
        }
        .glass {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.18);
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.35);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.22);
            border: 1px solid rgba(255,255,255,0.10);
        }
        
        /* Loading Spinner */
        .loadingspinner {
          --square: 26px;
          --offset: 30px;
          --duration: 2.4s;
          --delay: 0.2s;
          --timing-function: ease-in-out;
          --in-duration: 0.4s;
          --in-delay: 0.1s;
          --in-timing-function: ease-out;
          width: calc(3 * var(--offset) + var(--square));
          height: calc(2 * var(--offset) + var(--square));
          padding: 0px;
          margin-left: auto;
          margin-right: auto;
          margin-top: 10px;
          margin-bottom: 30px;
          position: relative;
        }

        .loadingspinner div {
          display: inline-block;
          background: rgb(92, 68, 180);
          border: none;
          border-radius: 2px;
          width: var(--square);
          height: var(--square);
          position: absolute;
          padding: 0px;
          margin: 0px;
          font-size: 6pt;
          color: black;
        }

        .loadingspinner #square1 {
          left: calc(0 * var(--offset));
          top: calc(0 * var(--offset));
          animation:
            square1 var(--duration) var(--delay) var(--timing-function) infinite,
            squarefadein var(--in-duration) calc(1 * var(--in-delay))
              var(--in-timing-function) both;
        }

        .loadingspinner #square2 {
          left: calc(0 * var(--offset));
          top: calc(1 * var(--offset));
          animation:
            square2 var(--duration) var(--delay) var(--timing-function) infinite,
            squarefadein var(--in-duration) calc(1 * var(--in-delay))
              var(--in-timing-function) both;
        }

        .loadingspinner #square3 {
          left: calc(1 * var(--offset));
          top: calc(1 * var(--offset));
          animation:
            square3 var(--duration) var(--delay) var(--timing-function) infinite,
            squarefadein var(--in-duration) calc(2 * var(--in-delay))
              var(--in-timing-function) both;
        }

        .loadingspinner #square4 {
          left: calc(2 * var(--offset));
          top: calc(1 * var(--offset));
          animation:
            square4 var(--duration) var(--delay) var(--timing-function) infinite,
            squarefadein var(--in-duration) calc(3 * var(--in-delay))
              var(--in-timing-function) both;
        }

        .loadingspinner #square5 {
          left: calc(3 * var(--offset));
          top: calc(1 * var(--offset));
          animation:
            square5 var(--duration) var(--delay) var(--timing-function) infinite,
            squarefadein var(--in-duration) calc(4 * var(--in-delay))
              var(--in-timing-function) both;
        }

        @keyframes square1 {
          0% { left: calc(0 * var(--offset)); top: calc(0 * var(--offset)); }
          8.333% { left: calc(0 * var(--offset)); top: calc(1 * var(--offset)); }
          100% { left: calc(0 * var(--offset)); top: calc(1 * var(--offset)); }
        }

        @keyframes square2 {
          0% { left: calc(0 * var(--offset)); top: calc(1 * var(--offset)); }
          8.333% { left: calc(0 * var(--offset)); top: calc(2 * var(--offset)); }
          16.67% { left: calc(1 * var(--offset)); top: calc(2 * var(--offset)); }
          25.00% { left: calc(1 * var(--offset)); top: calc(1 * var(--offset)); }
          83.33% { left: calc(1 * var(--offset)); top: calc(1 * var(--offset)); }
          91.67% { left: calc(1 * var(--offset)); top: calc(0 * var(--offset)); }
          100% { left: calc(0 * var(--offset)); top: calc(0 * var(--offset)); }
        }

        @keyframes square3 {
          0%, 100% { left: calc(1 * var(--offset)); top: calc(1 * var(--offset)); }
          16.67% { left: calc(1 * var(--offset)); top: calc(1 * var(--offset)); }
          25.00% { left: calc(1 * var(--offset)); top: calc(0 * var(--offset)); }
          33.33% { left: calc(2 * var(--offset)); top: calc(0 * var(--offset)); }
          41.67% { left: calc(2 * var(--offset)); top: calc(1 * var(--offset)); }
          66.67% { left: calc(2 * var(--offset)); top: calc(1 * var(--offset)); }
          75.00% { left: calc(2 * var(--offset)); top: calc(2 * var(--offset)); }
          83.33% { left: calc(1 * var(--offset)); top: calc(2 * var(--offset)); }
          91.67% { left: calc(1 * var(--offset)); top: calc(1 * var(--offset)); }
        }

        @keyframes square4 {
          0% { left: calc(2 * var(--offset)); top: calc(1 * var(--offset)); }
          33.33% { left: calc(2 * var(--offset)); top: calc(1 * var(--offset)); }
          41.67% { left: calc(2 * var(--offset)); top: calc(2 * var(--offset)); }
          50.00% { left: calc(3 * var(--offset)); top: calc(2 * var(--offset)); }
          58.33% { left: calc(3 * var(--offset)); top: calc(1 * var(--offset)); }
          100% { left: calc(3 * var(--offset)); top: calc(1 * var(--offset)); }
        }

        @keyframes square5 {
          0% { left: calc(3 * var(--offset)); top: calc(1 * var(--offset)); }
          50.00% { left: calc(3 * var(--offset)); top: calc(1 * var(--offset)); }
          58.33% { left: calc(3 * var(--offset)); top: calc(0 * var(--offset)); }
          66.67% { left: calc(2 * var(--offset)); top: calc(0 * var(--offset)); }
          75.00% { left: calc(2 * var(--offset)); top: calc(1 * var(--offset)); }
          100% { left: calc(2 * var(--offset)); top: calc(1 * var(--offset)); }
        }

        @keyframes squarefadein {
          0% { transform: scale(0.75); opacity: 0; }
          100% { transform: scale(1); opacity: 1; }
        }

        /* Pill Checkbox Styles */
        .checkbox-wrapper {
          position: relative;
          cursor: pointer;
          display: inline-flex;
          align-items: center;
          padding: 0.5rem 1rem;
          border-radius: 9999px;
          background: rgba(255, 255, 255, 0.4);
          border: 1px solid rgba(0, 0, 0, 0.1);
          transition: all 0.3s ease;
          user-select: none;
        }

        .dark .checkbox-wrapper {
          background: rgba(30, 41, 59, 0.5);
          border-color: rgba(255, 255, 255, 0.1);
        }

        .checkbox-wrapper input {
          position: absolute;
          opacity: 0;
          cursor: pointer;
          height: 0;
          width: 0;
        }

        .checkbox-wrapper svg {
          width: 1.25rem;
          height: 1.25rem;
          margin-right: 0.5rem;
        }

        .checkbox-wrapper .background {
          fill: transparent;
          transition: fill 0.3s ease;
        }

        .checkbox-wrapper .stroke {
          fill: none;
          stroke: #4f46e5;
          stroke-width: 2;
          stroke-dasharray: 100;
          stroke-dashoffset: 100;
          transition: stroke-dashoffset 0.3s ease;
        }

        .checkbox-wrapper .check {
          fill: none;
          stroke: white;
          stroke-width: 3;
          stroke-linecap: round;
          stroke-linejoin: round;
          stroke-dasharray: 100;
          stroke-dashoffset: 100;
          transition: stroke-dashoffset 0.3s ease;
        }

        .checkbox-wrapper input:checked ~ svg .background {
          fill: #4f46e5;
        }

        .checkbox-wrapper input:checked ~ svg .stroke {
          stroke-dashoffset: 0;
        }

        .checkbox-wrapper input:checked ~ svg .check {
          stroke-dashoffset: 0;
        }

        .checkbox-wrapper:has(input:checked) {
          background: linear-gradient(135deg, #4f46e5 0%, #7c73e6 100%);
          color: white;
          border-color: transparent;
        }

.switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 34px;
}

.switch #theme-toggle {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #2196f3;
  -webkit-transition: 0.4s;
  transition: 0.4s;
  z-index: 0;
  overflow: hidden;
}

.sun-moon {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: yellow;
  -webkit-transition: 0.4s;
  transition: 0.4s;
}

#theme-toggle:checked + .slider {
  background-color: black;
}

#theme-toggle:focus + .slider {
  box-shadow: 0 0 1px #2196f3;
}

#theme-toggle:checked + .slider .sun-moon {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
  background-color: white;
  -webkit-animation: rotate-center 0.6s ease-in-out both;
  animation: rotate-center 0.6s ease-in-out both;
}

@keyframes rotate-center {
  0% {
    transform: translateX(26px) rotate(0);
  }
  100% {
    transform: translateX(26px) rotate(360deg);
  }
}

.moon-dot {
  opacity: 0;
  transition: 0.4s;
  fill: gray;
}

#theme-toggle:checked + .slider .sun-moon .moon-dot {
  opacity: 1;
}

.slider.round {
  border-radius: 34px;
}

.slider.round .sun-moon {
  border-radius: 50%;
}

#moon-dot-1 {
  left: 10px;
  top: 3px;
  position: absolute;
  width: 6px;
  height: 6px;
  z-index: 4;
}

#moon-dot-2 {
  left: 2px;
  top: 10px;
  position: absolute;
  width: 10px;
  height: 10px;
  z-index: 4;
}

#moon-dot-3 {
  left: 16px;
  top: 18px;
  position: absolute;
  width: 3px;
  height: 3px;
  z-index: 4;
}

#light-ray-1 {
  left: -8px;
  top: -8px;
  position: absolute;
  width: 43px;
  height: 43px;
  z-index: -1;
  fill: white;
  opacity: 10%;
}

#light-ray-2 {
  left: -50%;
  top: -50%;
  position: absolute;
  width: 55px;
  height: 55px;
  z-index: -1;
  fill: white;
  opacity: 10%;
}

#light-ray-3 {
  left: -18px;
  top: -18px;
  position: absolute;
  width: 60px;
  height: 60px;
  z-index: -1;
  fill: white;
  opacity: 10%;
}

.cloud-light {
  position: absolute;
  fill: #eee;
  animation-name: cloud-move;
  animation-duration: 6s;
  animation-iteration-count: infinite;
}

.cloud-dark {
  position: absolute;
  fill: #ccc;
  animation-name: cloud-move;
  animation-duration: 6s;
  animation-iteration-count: infinite;
  animation-delay: 1s;
}

#cloud-1 {
  left: 30px;
  top: 15px;
  width: 40px;
}

#cloud-2 {
  left: 44px;
  top: 10px;
  width: 20px;
}

#cloud-3 {
  left: 18px;
  top: 24px;
  width: 30px;
}

#cloud-4 {
  left: 36px;
  top: 18px;
  width: 40px;
}

#cloud-5 {
  left: 48px;
  top: 14px;
  width: 20px;
}

#cloud-6 {
  left: 22px;
  top: 26px;
  width: 30px;
}

@keyframes cloud-move {
  0% {
    transform: translateX(0px);
  }

  40% {
    transform: translateX(4px);
  }

  80% {
    transform: translateX(-4px);
  }

  100% {
    transform: translateX(0px);
  }
}

.stars {
  transform: translateY(-32px);
  opacity: 0;
  transition: 0.4s;
}

.star {
  fill: white;
  position: absolute;
  -webkit-transition: 0.4s;
  transition: 0.4s;
  animation-name: star-twinkle;
  animation-duration: 2s;
  animation-iteration-count: infinite;
}

#theme-toggle:checked + .slider .stars {
  -webkit-transform: translateY(0);
  -ms-transform: translateY(0);
  transform: translateY(0);
  opacity: 1;
}

#star-1 {
  width: 20px;
  top: 2px;
  left: 3px;
  animation-delay: 0.3s;
}

#star-2 {
  width: 6px;
  top: 16px;
  left: 3px;
}

#star-3 {
  width: 12px;
  top: 20px;
  left: 10px;
  animation-delay: 0.6s;
}

#star-4 {
  width: 18px;
  top: 0px;
  left: 18px;
  animation-delay: 1.3s;
}

@keyframes star-twinkle {
  0% {
    transform: scale(1);
  }

  40% {
    transform: scale(1.2);
  }

  80% {
    transform: scale(0.8);
  }

  100% {
    transform: scale(1);
  }
}

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        .option-selected {
            transform: scale(0.98);
        }
        .fill-input {
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 0.25rem;
            padding: 0.25rem 0.5rem;
            margin: 0 0.25rem;
        }
        .dark .fill-input {
            background: rgba(0,0,0,0.2);
            border-color: rgba(255,255,255,0.1);
        }
    </style>

    let selectedQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    let timeLeft;
    let startTime;
    let answeredQuestions = 0;
    let selectedCategories = [];
    let skippedQuestionIndices = [];

    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const questionCountInput = document.getElementById('question-count');
    const countDisplay = document.getElementById('count-display');
    const startBtn = document.getElementById('start-btn');
    const nextBtn = document.getElementById('next-btn');
    const skipBtn = document.getElementById('skip-btn');
    const restartBtn = document.getElementById('restart-btn');
    const questionElement = document.getElementById('question');
    const optionsElement = document.getElementById('options');
    const currentQuestionElement = document.getElementById('current-question');
    const totalQuestionsElement = document.getElementById('total-questions');
    const timerElement = document.getElementById('timer');
    const scoreElement = document.getElementById('score');
    const finalScoreElement = document.getElementById('final-score');
    const totalScoreElement = document.getElementById('total-score');
    const progressBar = document.getElementById('progress-bar');
    const questionCategory = document.getElementById('question-category');
    const categoriesCompleted = document.getElementById('categories-completed');
    const correctAnswersElement = document.getElementById('correct-answers');
    const wrongAnswersElement = document.getElementById('wrong-answers');
    const skippedQuestionsElement = document.getElementById('skipped-questions');
    const timeTakenElement = document.getElementById('time-taken');
    const themeToggle = document.getElementById('theme-toggle');
    const loadingScreen = document.getElementById('loading-screen');

    themeToggle.addEventListener('change', () => {
        document.documentElement.classList.toggle('dark');
    });

    questionCountInput.addEventListener('input', () => {
        countDisplay.textContent = questionCountInput.value;
    });

    function getSelectedCategories() {
        const checkboxes = document.querySelectorAll('.category-checkbox:checked');
        selectedCategories = Array.from(checkboxes).map(cb => cb.value);
        return selectedCategories;
    }

    startBtn.addEventListener('click', startQuiz);
    nextBtn.addEventListener('click', showNextQuestion);
    skipBtn.addEventListener('click', skipQuestion);
    restartBtn.addEventListener('click', () => {
        startScreen.classList.remove('hidden');
        quizScreen.classList.add('hidden');
        resultScreen.classList.add('hidden');
        questionCountInput.value = 50;
        countDisplay.textContent = '50';
    });

    function startQuiz() {
        const numQuestions = parseInt(questionCountInput.value);
        if (numQuestions < 50 || numQuestions > 100 || isNaN(numQuestions)) {
            alert('Please enter a number between 50 and 100.');
            return;
        }

        getSelectedCategories();
        if (selectedCategories.length === 0) {
            alert('Please select at least one category.');
            return;
        }

        startScreen.classList.add('hidden');
        loadingScreen.classList.remove('hidden');

        setTimeout(() => {
            loadingScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            selectedQuestions = getRandomQuestions(numQuestions);
            currentQuestionIndex = 0;
            score = 0;
            answeredQuestions = 0;
            skippedQuestionIndices = [];
            startTime = new Date();
            timeLeft = calculateTime(numQuestions);
            updateTimerDisplay();
            timerInterval = setInterval(updateTimer, 1000);
            showQuestion();
        }, 5000);
    }

    function getRandomQuestions(num) {
        const filteredQuestions = questions.filter(q => selectedCategories.includes(q.category));
        const shuffled = [...filteredQuestions].sort(() => 0.5 - Math.random());
        if (shuffled.length < num) {
            const allShuffled = [...questions].sort(() => 0.5 - Math.random());
            return allShuffled.slice(0, num);
        }
        return shuffled.slice(0, num);
    }

    function calculateTime(numQuestions) {
        return numQuestions * 30;
    }

    function updateTimerDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerElement.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        if (timeLeft <= 60) {
            timerElement.classList.add('text-red-500', 'animate-pulse');
        } else {
            timerElement.classList.remove('text-red-500', 'animate-pulse');
        }
    }

    function updateTimer() {
        timeLeft--;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            endQuiz();
        } else {
            updateTimerDisplay();
        }
    }

    function showQuestion() {
        const question = selectedQuestions[currentQuestionIndex];
        questionElement.innerHTML = '';
        optionsElement.innerHTML = '';
        questionCategory.textContent = question.category;

        if (question.type === "fill") {
            questionElement.innerHTML = question.question;
            const input = questionElement.querySelector('.fill-input');
            if (input) input.className = 'fill-input p-2 border rounded bg-white/50 dark:bg-gray-700/50';

            const submitBtn = document.createElement('button');
            submitBtn.textContent = "Submit";
            submitBtn.className = 'w-full bg-primary-light dark:bg-primary-dark text-white py-2 px-4 rounded-lg font-medium hover:opacity-90 transition-opacity mt-4';
            submitBtn.addEventListener('click', () => {
                const input = questionElement.querySelector('.fill-input');
                if (!input) return;

                const userAnswer = input.value.trim();
                const correctAnswer = question.answer;
                const normalizeAnswer = (ans) => {
                    if (correctAnswer.startsWith('<') && correctAnswer.endsWith('>')) {
                        return ans.replace(/[<>]/g, '').trim().toLowerCase();
                    }
                    return ans.toLowerCase();
                };

                const isCorrect = normalizeAnswer(userAnswer) === normalizeAnswer(correctAnswer);
                input.disabled = true;
                submitBtn.disabled = true;

                if (isCorrect) {
                    input.classList.add('bg-secondary-light', 'dark:bg-secondary-dark', 'text-white');
                    score++;
                    scoreElement.textContent = score;
                } else {
                    input.classList.add('bg-red-500', 'text-white');
                    const correctSpan = document.createElement('span');
                    correctSpan.textContent = ` (Correct: ${correctAnswer})`;
                    correctSpan.className = 'ml-2 text-sm';
                    input.parentNode.insertBefore(correctSpan, input.nextSibling);
                }

                answeredQuestions++;
                nextBtn.classList.remove('hidden');
            });

            optionsElement.appendChild(submitBtn);
        } else {
            questionElement.textContent = question.question;
            question.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'w-full p-3 text-left border rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors option-btn';
                button.textContent = option;
                button.addEventListener('click', () => selectOption(index, question.answer));
                optionsElement.appendChild(button);
            });
        }

        currentQuestionElement.textContent = currentQuestionIndex + 1;
        totalQuestionsElement.textContent = selectedQuestions.length;
        scoreElement.textContent = score;
        const progress = ((answeredQuestions + skippedQuestionIndices.length) / selectedQuestions.length) * 100;
        progressBar.style.width = `${progress}%`;
        nextBtn.classList.add('hidden');
    }

    function selectOption(selectedIndex, correctIndex) {
        const options = document.querySelectorAll('.option-btn');
        options.forEach(btn => {
            btn.disabled = true;
            btn.classList.remove('hover:bg-gray-100', 'dark:hover:bg-gray-700');
        });

        options[correctIndex].classList.add('bg-secondary-light', 'dark:bg-secondary-dark', 'text-white');

        if (selectedIndex !== correctIndex) {
            options[selectedIndex].classList.add('bg-red-500', 'text-white');
        } else {
            score++;
            scoreElement.textContent = score;
        }

        answeredQuestions++;
        nextBtn.classList.remove('hidden');
    }

    function skipQuestion() {
        if (!skippedQuestionIndices.includes(currentQuestionIndex)) {
            skippedQuestionIndices.push(currentQuestionIndex);
        }
        showNextQuestion();
    }

    function showNextQuestion() {
        currentQuestionIndex++;

        if (currentQuestionIndex < selectedQuestions.length) {
            showQuestion();
        } else if (skippedQuestionIndices.length > 0) {
            alert("You've finished all new questions. Revisiting skipped...");
            currentQuestionIndex = skippedQuestionIndices.shift();
            showQuestion();
        } else {
            clearInterval(timerInterval);
            endQuiz();
        }
    }

    function endQuiz() {
        quizScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');

        const totalQuestions = selectedQuestions.length;
        const correctAnswers = score;
        const wrongAnswers = answeredQuestions - score;
        const skipped = totalQuestions - answeredQuestions;

        const endTime = new Date();
        const timeTaken = Math.floor((endTime - startTime) / 1000);
        const minutes = Math.floor(timeTaken / 60);
        const seconds = timeTaken % 60;

        finalScoreElement.textContent = correctAnswers;
        totalScoreElement.textContent = totalQuestions;
        correctAnswersElement.textContent = correctAnswers;
        wrongAnswersElement.textContent = wrongAnswers;
        skippedQuestionsElement.textContent = skipped;
        timeTakenElement.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

        const uniqueCategories = [...new Set(selectedQuestions.map(q => q.category))];
        categoriesCompleted.textContent = uniqueCategories.join(', ');
    }
</script>
</body>
</html>
