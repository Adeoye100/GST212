<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Game</title>
  <link rel="shortcut icon" href="philosoph.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google tag (gtag.js) -->

<script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    primary: {
                        light: '#4f46e5',
                        dark: '#7c73e6'
                    },
                    secondary: {
                        light: '#10b981',
                        dark: '#34d399'
                    }
                },
                animation: {
                    'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                },
                backgroundImage: {
                    'colorful-glass': 'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 25%, #fbc2eb 50%, #fcb69f 75%, #a1c4fd 100%)',
                    'colorful-glass-dark': 'linear-gradient(135deg, #232526 0%, #414345 25%, #434343 50%, #232526 75%, #232526 100%)'
                }
            }
        }
    }
</script>
<style>
    body {
        background-image: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 25%, #fbc2eb 50%, #fcb69f 75%, #a1c4fd 100%);
    }
    .dark body {
        background-image: linear-gradient(135deg, #232526 0%, #414345 25%, #434343 50%, #232526 75%, #232526 100%);
    }
    .glass {
        background: rgba(255,255,255,0.25);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border-radius: 1.5rem;
        border: 1px solid rgba(255,255,255,0.18);
    }
    .dark .glass {
        background: rgba(30, 41, 59, 0.35);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.22);
        border: 1px solid rgba(255,255,255,0.10);
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
        animation: fadeIn 0.3s ease-out forwards;
    }
    .progress-bar {
        transition: width 0.3s ease;
    }
    .option-selected {
        transform: scale(0.98);
    }
    .fill-input {
        background: rgba(255,255,255,0.5);
        border: 1px solid rgba(0,0,0,0.1);
        border-radius: 0.25rem;
        padding: 0.25rem 0.5rem;
        margin: 0 0.25rem;
    }
    .dark .fill-input {
        background: rgba(0,0,0,0.2);
        border-color: rgba(255,255,255,0.1);
    }
</style>
</head>
<body class="bg-transparent dark:bg-transparent text-gray-800 dark:text-gray-200 transition-colors duration-300 flex items-center justify-center min-h-screen p-4">
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none">
    <div class="w-full h-full bg-gradient-to-br from-blue-400 via-pink-200 to-yellow-200 dark:from-gray-900 dark:via-gray-800 dark:to-gray-700 opacity-80"></div>
</div>

<div class="fixed top-4 right-4">
    <button id="theme-toggle" class="p-2 rounded-full bg-white dark:bg-gray-800 shadow-md hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
    </button>
</div>

<div id="start-screen" class="glass bg-white/60 dark:bg-gray-800/60 p-8 rounded-xl shadow-xl w-full max-w-md fade-in">
    <div class="text-center mb-6">
        <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-primary-light to-secondary-light dark:from-primary-dark dark:to-secondary-dark bg-clip-text text-transparent">QuizMaster</h1>
        <p class="text-gray-600 dark:text-gray-400">Test your knowledge across various tech topics</p>
    </div>
    
    <div class="mb-6">
        <label for="question-count" class="block mb-2 font-medium">Number of questions (50-100):</label>
        <input type="range" id="question-count" min="50" max="100" value="50" class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer">
        <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400 mt-1">
            <span>50</span>
            <span id="count-display" class="font-bold text-primary-light dark:text-primary-dark">50</span>
            <span>100</span>
        </div>
    </div>
    
    <div class="mb-6">
        <label class="block mb-2 font-medium">Select categories:</label>
        <div class="grid grid-cols-2 gap-2">
            <label class="flex items-center space-x-2">
                <input type="checkbox" class="category-checkbox" value="HTML" checked>
                <span>HTML</span>
            </label>
            <label class="flex items-center space-x-2">
                <input type="checkbox" class="category-checkbox" value="CSS" checked>
                <span>CSS</span>
            </label>
            <label class="flex items-center space-x-2">
                <input type="checkbox" class="category-checkbox" value="JavaScript" checked>
                <span>JavaScript</span>
            </label>
            <label class="flex items-center space-x-2">
                <input type="checkbox" class="category-checkbox" value="Web History" checked>
                <span>Web History</span>
            </label>
            <label class="flex items-center space-x-2">
                <input type="checkbox" class="category-checkbox" value="Networking" checked>
                <span>Networking</span>
            </label>
            <label class="flex items-center space-x-2">
                <input type="checkbox" class="category-checkbox" value="Web Concepts" checked>
                <span>Web Concepts</span>
            </label>
             <label class="flex items-center space-x-2">
                <input type="checkbox" class="category-checkbox" value="Bootstrap" checked>
                <span>Bootstrap</span>
            </label>
        </div>
    </div>
    
    <button id="start-btn" class="w-full bg-primary-light dark:bg-primary-dark text-white py-3 px-4 rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center justify-center space-x-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
        </svg>
        <span>Start Quiz</span>
    </button>
</div>

<div id="quiz-screen" class="hidden glass bg-white/60 dark:bg-gray-800/60 p-6 rounded-xl shadow-xl w-full max-w-2xl">
    <div class="flex flex-col space-y-4 mb-6">
        <div class="flex justify-between items-center">
            <div class="text-sm font-medium text-gray-600 dark:text-gray-400">
                Question <span id="current-question" class="font-bold text-primary-light dark:text-primary-dark">1</span> 
                of <span id="total-questions" class="font-bold">50</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-sm font-medium flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span id="timer">30:00</span>
                </div>
                <div class="text-sm font-medium flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span id="score">0</span>
                </div>
            </div>
        </div>
        
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5">
            <div id="progress-bar" class="progress-bar bg-primary-light dark:bg-primary-dark h-2.5 rounded-full" style="width: 0%"></div>
        </div>
        
        <div class="text-xs font-medium text-secondary-light dark:text-secondary-dark" id="question-category"></div>
    </div>
    
    <h2 id="question" class="text-xl font-semibold mb-6"></h2>
    
    <div id="options" class="grid gap-3 mb-6"></div>
    
    <div class="flex justify-between">
        <button id="skip-btn" class="bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 py-2 px-4 rounded-lg font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
            Skip
        </button>
        <button id="next-btn" class="bg-primary-light dark:bg-primary-dark text-white py-2 px-4 rounded-lg font-medium hover:opacity-90 transition-opacity hidden">
            Next
        </button>
    </div>
</div>

<div id="result-screen" class="hidden glass bg-white/60 dark:bg-gray-800/60 p-8 rounded-xl shadow-xl w-full max-w-md text-center fade-in">
    <div class="mb-6">
        <h1 class="text-3xl font-bold mb-2">Quiz Completed!</h1>
        <p class="text-gray-600 dark:text-gray-400">You've tested your knowledge across <span id="categories-completed"></span> categories</p>
    </div>
    
    <div class="bg-gray-100/70 dark:bg-gray-700/70 rounded-xl p-6 mb-6">
        <div class="text-5xl font-bold mb-2 bg-gradient-to-r from-primary-light to-secondary-light dark:from-primary-dark dark:to-secondary-dark bg-clip-text text-transparent">
            <span id="final-score">0</span>/<span id="total-score">50</span>
        </div>
        <div class="text-sm text-gray-600 dark:text-gray-400">Your Score</div>
        
        <div class="mt-4 grid grid-cols-3 gap-4 text-sm">
            <div>
                <div class="font-bold"><span id="correct-answers">0</span></div>
                <div class="text-gray-600 dark:text-gray-400">Correct</div>
            </div>
            <div>
                <div class="font-bold"><span id="wrong-answers">0</span></div>
                <div class="text-gray-600 dark:text-gray-400">Wrong</div>
            </div>
            <div>
                <div class="font-bold"><span id="skipped-questions">0</span></div>
                <div class="text-gray-600 dark:text-gray-400">Skipped</div>
            </div>
        </div>
    </div>
    
    <div class="mb-6">
        <div class="text-sm font-medium mb-2">Time Taken</div>
        <div class="text-xl font-bold" id="time-taken">0:00</div>
    </div>
    
    <button id="restart-btn" class="w-full bg-primary-light dark:bg-primary-dark text-white py-3 px-4 rounded-lg font-medium hover:opacity-90 transition-opacity">
        Take Another Quiz
    </button>
</div>

  themeIcon.innerHTML = isDark 
    ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />'
    : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />';
});

questionCountInput.addEventListener('input', () => {
  countDisplay.textContent = questionCountInput.value;
});

function getSelectedCategories() {
  const checkboxes = document.querySelectorAll('.category-checkbox:checked');
  selectedCategories = Array.from(checkboxes).map(cb => cb.value);
  return selectedCategories;
}

startBtn.addEventListener('click', startQuiz);
nextBtn.addEventListener('click', showNextQuestion);
skipBtn.addEventListener('click', skipQuestion);
restartBtn.addEventListener('click', () => {
  startScreen.classList.remove('hidden');
  quizScreen.classList.add('hidden');
  resultScreen.classList.add('hidden');
  questionCountInput.value = 50;
  countDisplay.textContent = '50';
});

function startQuiz() {
  const numQuestions = parseInt(questionCountInput.value);
  if (numQuestions < 50 || numQuestions > 100 || isNaN(numQuestions)) {
    alert('Please enter a number between 50 and 100.');
    return;
  }

  getSelectedCategories();
  if (selectedCategories.length === 0) {
    alert('Please select at least one category.');
    return;
  }

  startScreen.classList.add('hidden');
  quizScreen.classList.remove('hidden');
  selectedQuestions = getRandomQuestions(numQuestions);
  currentQuestionIndex = 0;
  score = 0;
  answeredQuestions = 0;
  skippedQuestionIndices = []; // ✅ Reset skipped
  startTime = new Date();
  timeLeft = calculateTime(numQuestions);
  updateTimerDisplay();
  timerInterval = setInterval(updateTimer, 1000);
  showQuestion();
}

function getRandomQuestions(num) {
  const filteredQuestions = questions.filter(q => selectedCategories.includes(q.category));
  const shuffled = [...filteredQuestions].sort(() => 0.5 - Math.random());
  if (shuffled.length < num) {
    const allShuffled = [...questions].sort(() => 0.5 - Math.random());
    return allShuffled.slice(0, num);
  }
  return shuffled.slice(0, num);
}

function calculateTime(numQuestions) {
  return numQuestions * 30;
}

function updateTimerDisplay() {
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  timerElement.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
  if (timeLeft <= 60) {
    timerElement.classList.add('text-red-500', 'animate-pulse');
  } else {
    timerElement.classList.remove('text-red-500', 'animate-pulse');
  }
}

function updateTimer() {
  timeLeft--;
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    endQuiz();
  } else {
    updateTimerDisplay();
  }
}

function showQuestion() {
  const question = selectedQuestions[currentQuestionIndex];
  questionElement.innerHTML = '';
  optionsElement.innerHTML = '';
  questionCategory.textContent = question.category;

  if (question.type === "fill") {
    questionElement.innerHTML = question.question;
    const input = questionElement.querySelector('.fill-input');
    if (input) input.className = 'fill-input p-2 border rounded bg-white/50 dark:bg-gray-700/50';

    const submitBtn = document.createElement('button');
    submitBtn.textContent = "Submit";
    submitBtn.className = 'w-full bg-primary-light dark:bg-primary-dark text-white py-2 px-4 rounded-lg font-medium hover:opacity-90 transition-opacity mt-4';
    submitBtn.addEventListener('click', () => {
      const input = questionElement.querySelector('.fill-input');
      if (!input) return;

      const userAnswer = input.value.trim();
      const correctAnswer = question.answer;
      const normalizeAnswer = (ans) => {
        if (correctAnswer.startsWith('<') && correctAnswer.endsWith('>')) {
          return ans.replace(/[<>]/g, '').trim().toLowerCase();
        }
        return ans.toLowerCase();
      };

      const isCorrect = normalizeAnswer(userAnswer) === normalizeAnswer(correctAnswer);
      input.disabled = true;
      submitBtn.disabled = true;

      if (isCorrect) {
        input.classList.add('bg-secondary-light', 'dark:bg-secondary-dark', 'text-white');
        score++;
        scoreElement.textContent = score;
      } else {
        input.classList.add('bg-red-500', 'text-white');
        const correctSpan = document.createElement('span');
        correctSpan.textContent = ` (Correct: ${correctAnswer})`;
        correctSpan.className = 'ml-2 text-sm';
        input.parentNode.insertBefore(correctSpan, input.nextSibling);
      }

      answeredQuestions++;
      nextBtn.classList.remove('hidden');
    });

    optionsElement.appendChild(submitBtn);
  } else {
    questionElement.textContent = question.question;
    question.options.forEach((option, index) => {
      const button = document.createElement('button');
      button.className = 'w-full p-3 text-left border rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors option-btn';
      button.textContent = option;
      button.addEventListener('click', () => selectOption(index, question.answer));
      optionsElement.appendChild(button);
    });
  }

  currentQuestionElement.textContent = currentQuestionIndex + 1;
  totalQuestionsElement.textContent = selectedQuestions.length;
  scoreElement.textContent = score;
  const progress = ((answeredQuestions + skippedQuestionIndices.length) / selectedQuestions.length) * 100;
  progressBar.style.width = `${progress}%`;
  nextBtn.classList.add('hidden');
}

function selectOption(selectedIndex, correctIndex) {
  const options = document.querySelectorAll('.option-btn');
  options.forEach(btn => {
    btn.disabled = true;
    btn.classList.remove('hover:bg-gray-100', 'dark:hover:bg-gray-700');
  });

  options[correctIndex].classList.add('bg-secondary-light', 'dark:bg-secondary-dark', 'text-white');

  if (selectedIndex !== correctIndex) {
    options[selectedIndex].classList.add('bg-red-500', 'text-white');
  } else {
    score++;
    scoreElement.textContent = score;
  }

  answeredQuestions++;
  nextBtn.classList.remove('hidden');
}

function skipQuestion() {
  if (!skippedQuestionIndices.includes(currentQuestionIndex)) {
    skippedQuestionIndices.push(currentQuestionIndex); // ✅ Track skipped index
  }
  showNextQuestion();
}

function showNextQuestion() {
  currentQuestionIndex++;

  if (currentQuestionIndex < selectedQuestions.length) {
    showQuestion();
  } else if (skippedQuestionIndices.length > 0) {
    alert("You've finished all new questions. Revisiting skipped...");
    currentQuestionIndex = skippedQuestionIndices.shift(); // ✅ Revisit
    showQuestion();
  } else {
    clearInterval(timerInterval);
    endQuiz();
  }
}

function endQuiz() {
  quizScreen.classList.add('hidden');
  resultScreen.classList.remove('hidden');

  const totalQuestions = selectedQuestions.length;
  const correctAnswers = score;
  const wrongAnswers = answeredQuestions - score;
  const skipped = totalQuestions - answeredQuestions;

  const endTime = new Date();
  const timeTaken = Math.floor((endTime - startTime) / 1000);
  const minutes = Math.floor(timeTaken / 60);
  const seconds = timeTaken % 60;

  finalScoreElement.textContent = correctAnswers;
  totalScoreElement.textContent = totalQuestions;
  correctAnswersElement.textContent = correctAnswers;
  wrongAnswersElement.textContent = wrongAnswers;
  skippedQuestionsElement.textContent = skipped;
  timeTakenElement.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

  const uniqueCategories = [...new Set(selectedQuestions.map(q => q.category))];
  categoriesCompleted.textContent = uniqueCategories.join(', ');
}
</script>
</body>
